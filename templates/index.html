<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Merchant Risk Scorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: #1e293b;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #f1f5f9; font-size: 1.8rem; font-weight: 700; }
        .header p { color: #94a3b8; margin-top: 0.5rem; font-size: 0.95rem; }
        .badge {
            display: inline-block;
            background: #0ea5e9;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { color: #94a3b8; font-size: 0.85rem; font-weight: 500; }
        .field input, .field select {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f1f5f9;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus, .field select:focus { border-color: #0ea5e9; }
        .field select option { background: #1e293b; }
        .divider {
            color: #475569;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #334155;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span class="badge">AI-Powered Credit Scoring</span>
        <h1>UPI Merchant Risk Scorer</h1>
        <p>Enter merchant UPI transaction data to assess credit risk</p>
    </div>

    <form action="/predict" method="POST">
        <div class="divider">Financial Metrics</div>
        <div class="grid">
            <div class="field">
                <label>Avg Monthly Revenue (₹)</label>
                <input type="number" name="avg_monthly_revenue" placeholder="e.g. 45000" required>
            </div>
            <div class="field">
                <label>Avg Monthly Transactions</label>
                <input type="number" name="avg_monthly_txns" placeholder="e.g. 120" required>
            </div>
            <div class="field">
                <label>Avg Refund Rate (%)</label>
                <input type="number" step="0.1" name="avg_refund_rate" placeholder="e.g. 3.5" required>
            </div>
            <div class="field">
                <label>Avg Failure Rate (%)</label>
                <input type="number" step="0.1" name="avg_failure_rate" placeholder="e.g. 5.0" required>
            </div>
            <div class="field">
                <label>Avg MoM Growth (%)</label>
                <input type="number" step="0.1" name="avg_mom_growth" placeholder="e.g. 2.5" required>
            </div>
            <div class="field">
                <label>Worst Month Growth (%)</label>
                <input type="number" step="0.1" name="worst_mom_growth" placeholder="e.g. -15.0" required>
            </div>
        </div>

        <div class="divider">Business Profile</div>
        <div class="grid">
            <div class="field">
                <label>Negative Growth Months</label>
                <input type="number" name="negative_months" placeholder="e.g. 3" required>
            </div>
            <div class="field">
                <label>Total Months in Business</label>
                <input type="number" name="total_months" placeholder="e.g. 18" required>
            </div>
            <div class="field">
                <label>Business Age (Days)</label>
                <input type="number" name="business_age_days" placeholder="e.g. 730" required>
            </div>
            <div class="field">
                <label>Monthly Rent (₹)</label>
                <input type="number" name="monthly_rent" placeholder="0 if unknown" required>
            </div>
            <div class="field">
                <label>Business Category</label>
                <select name="category" required>
                    <option value="">Select category</option>
                    <option value="kirana">Kirana</option>
                    <option value="textile">Textile</option>
                    <option value="pharmacy">Pharmacy</option>
                    <option value="electronics">Electronics</option>
                    <option value="food">Food</option>
                    <option value="hardware">Hardware</option>
                    <option value="salon">Salon</option>
                </select>
            </div>
            <div class="field">
                <label>City</label>
                <select name="city" required>
                    <option value="">Select city</option>
                    <option value="jalandhar">Jalandhar</option>
                    <option value="ludhiana">Ludhiana</option>
                    <option value="amritsar">Amritsar</option>
                    <option value="chandigarh">Chandigarh</option>
                    <option value="patiala">Patiala</option>
                    <option value="bathinda">Bathinda</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn">Assess Credit Risk →</button>
    </form>
</div>
</body>
</html>
